<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 Pixel Battle - Сервера</title>
    <style>
        /* Стили для меню выбора сервера */
        #serverMenu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 20, 0.95);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .menu-container {
            width: 800px;
            max-width: 90%;
            max-height: 80vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 30px;
            padding: 30px;
            border: 2px solid #5a5a8a;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow-y: auto;
            color: white;
        }
        
        .menu-title {
            font-size: 32px;
            text-align: center;
            margin-bottom: 30px;
            color: #bbbbff;
            text-shadow: 0 0 20px #6a6aff;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #3a3a5a;
        }
        
        .tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 10px 10px 0 0;
        }
        
        .tab:hover {
            background: #2a2a4a;
            color: white;
        }
        
        .tab.active {
            background: #3a3a6a;
            color: white;
        }
        
        .server-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .server-item {
            background: #1e1e3a;
            border-radius: 15px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #4a4a7a;
            transition: 0.2s;
        }
        
        .server-item:hover {
            background: #2a2a5a;
            border-color: #7a7aff;
        }
        
        .server-info {
            flex: 1;
        }
        
        .server-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .server-stats {
            font-size: 14px;
            color: #aaccff;
        }
        
        .join-btn {
            padding: 10px 25px;
            background: #5a5a9a;
            border: none;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        
        .join-btn:hover {
            background: #7a7aff;
            transform: scale(1.05);
        }
        
        .create-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label {
            color: #aaccff;
            font-size: 14px;
        }
        
        .form-group input {
            padding: 12px;
            background: #1a1a2e;
            border: 2px solid #3a3a5a;
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #7a7aff;
        }
        
        .create-btn {
            padding: 15px;
            background: linear-gradient(135deg, #6a6aff, #4a4aaa);
            border: none;
            color: white;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .create-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(106, 106, 255, 0.3);
        }
        
        .access-code-display {
            background: #0a0a15;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-family: monospace;
            font-size: 24px;
            letter-spacing: 4px;
            border: 2px dashed #6a6aff;
            margin-top: 10px;
        }
        
        .hidden {
            display: none !important;
        }
        
        #gameContainer.hidden {
            display: none;
        }
    </style>
    <!-- Остальные стили из предыдущей версии -->
</head>
<body>
    <!-- Меню выбора сервера -->
    <div id="serverMenu">
        <div class="menu-container">
            <div class="menu-title">🎮 Pixel Battle</div>
            
            <div class="tabs">
                <button class="tab active" data-tab="public">🌍 Публичные сервера</button>
                <button class="tab" data-tab="create">✨ Создать сервер</button>
                <button class="tab" data-tab="join">🔑 Приватный сервер</button>
            </div>
            
            <!-- Публичные сервера -->
            <div id="publicServersTab" class="tab-content">
                <div class="server-list" id="serverList">
                    <div style="text-align: center; padding: 40px; color: #888;">
                        Загрузка серверов...
                    </div>
                </div>
            </div>
            
            <!-- Создание сервера -->
            <div id="createServerTab" class="tab-content hidden">
                <div class="create-form">
                    <div class="form-group">
                        <label>🏷️ Название сервера</label>
                        <input type="text" id="serverName" placeholder="Мой сервер" maxlength="32">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="isPrivateServer"> 🔒 Приватный сервер
                        </label>
                    </div>
                    <div class="form-group">
                        <label>👥 Максимум игроков</label>
                        <input type="number" id="maxPlayers" value="50" min="2" max="100">
                    </div>
                    <button class="create-btn" id="createServerBtn">🚀 Создать сервер</button>
                    
                    <div id="serverCreatedInfo" class="hidden">
                        <div class="access-code-display" id="accessCodeDisplay"></div>
                        <p style="color: #aaffaa; text-align: center; margin-top: 10px;">
                            ✅ Сервер создан! Отправьте код друзьям для входа.
                        </p>
                    </div>
                </div>
            </div>
            
            <!-- Подключение к приватному серверу -->
            <div id="joinServerTab" class="tab-content hidden">
                <div class="create-form">
                    <div class="form-group">
                        <label>🔑 Код доступа</label>
                        <input type="text" id="accessCodeInput" placeholder="Введите код" maxlength="6" style="text-transform: uppercase;">
                    </div>
                    <button class="create-btn" id="joinPrivateBtn">🔗 Подключиться</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Игровой контейнер (скрыт до подключения) -->
    <div id="gameContainer" class="hidden">
        <!-- Весь игровой интерфейс из предыдущей версии -->
    </div>
    
    <script>
        // Код клиента с поддержкой серверов
    </script>
</body>
</html>
